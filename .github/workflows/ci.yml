name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [dev]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: codecommerce
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v -o server ./cmd/server/

      - name: Run unit tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/codecommerce?sslmode=disable
        run: go test -v ./...

      - name: Start server
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/codecommerce?sslmode=disable
        run: ./server &

      - name: Wait for server
        run: sleep 3

      - name: Install hurl
        run: |
          curl -sL https://github.com/Orange-OpenSource/hurl/releases/download/7.1.0/hurl_7.1.0_amd64.deb -o hurl.deb
          sudo dpkg -i hurl.deb

      - name: Run hurl integration tests
        run: hurl --test tests/*.hurl
